version: '3.8'

# Padrão global de persistência de logs do Docker (Log Rotation)
# Impede que os logs crashem o servidor enchendo o disco com o tempo
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"
    compress: "true"

services:
  frontend:
    build:
      context: .
      target: frontend
      args:
        - REACT_APP_API_URL=${REACT_APP_API_URL}
    ports:
      - "3030:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: always
    logging: *default-logging
    volumes:
      # Persiste os arquivos brutos de log de acesso do Nginx independentes do container
      - nginx_logs:/var/log/nginx

  backend:
    build:
      context: .
      target: backend
    ports:
      - "3031:3001"
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/esgotin
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET}
      - WASP_WEB_CLIENT_URL=${WASP_WEB_CLIENT_URL}
      - WASP_SERVER_URL=${REACT_APP_API_URL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: always
    logging: *default-logging

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=esgotin
    ports:
      - "3033:5432"
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d esgotin"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    logging: *default-logging

  # Adição de "Alto Nível": Dozzle para visualização amigável dos logs persistidos
  # Acesso via browser, levíssimo, sem necessidade de configurar um stack pesado como ELK.
  log-viewer:
    image: amir20/dozzle:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "3032:8080"
    environment:
      - DOZZLE_LEVEL=info
      - DOZZLE_TAILSIZE=300
    restart: always

volumes:
  pgdata_prod:
  nginx_logs:
