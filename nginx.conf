user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    sendfile        on;
    keepalive_timeout  65;

    # Roteamento do Frontend (React)
    server {
        listen 80;
        # Troque pelo seu domínio principal
        server_name esgotin.frameworksweb.com.br localhost;

        root /usr/share/nginx/html;
        index index.html;

        # Suporte para React Router (SPA)
        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # Roteamento do Backend (Node.js/Wasp)
    server {
        listen 80;
        # Subdomínio exclusivo para a API
        server_name api-esgotin.frameworksweb.com.br;

        location / {
            proxy_pass http://backend:3001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            
            # Repassar IPs reais do Cloudflare para o Node.js
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
